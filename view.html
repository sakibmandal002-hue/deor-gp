<!DOCTYPE html>
<html>
<head>
  <title>Certificate View</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    #paper {
      width: 210mm;
      min-height: 297mm;
      margin: auto;
      background: white;
      padding: 20mm;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    /* 🔥 FULL PAGE LETTERHEAD */
    #paper::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      background-image: url("letterhead.jpg");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;

      opacity: 1;

      z-index: 0;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
    }

    th, td {
      padding: 6px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #eee;
    }

    button {
      margin: 10px;
      padding: 8px 15px;
      cursor: pointer;
    }

    @media print {
      body { background: white; }
      button { display: none; }

      #paper {
        margin: 0;
        width: 210mm;
        height: 297mm;
      }
    }
  </style>
</head>

<body>

<button onclick="window.print()">🖨 Print</button>

<div id="paper">
  <div class="content" id="content"></div>
</div>

<script>

// ✅ LOAD DATA
let data = JSON.parse(localStorage.getItem("certData"));

if(!data){
  document.body.innerHTML = "<h2>No Data Found</h2>";
  throw new Error("No Data");
}

// ✅ VALUE CHECK
function val(v){
  return v ? v : "-";
}

// 🔥 NEW RELATION FORMAT (ADD ONLY)
function relationText(){
  if(data.relType && data.relName){
    return data.relType + " " + data.relName;
  }
  return val(data.relation);
}

// ✅ HEIRS TABLE
let heirsRows = "";

if(data.heirs && data.heirs.length > 0){
  data.heirs.forEach((h,i)=>{
    heirsRows += `
      <tr>
        <td>${i+1}</td>
        <td>${val(h.name)}</td>
        <td>${val(h.age)}</td>
        <td>${val(h.rel)}</td>
        <td>${val(h.addr)}</td>
        <td>${val(h.epic) || "N/A"}</td>
      </tr>
    `;
  });
} else {
  heirsRows = `<tr><td colspan="6" style="text-align:center;">No Heir Data</td></tr>`;
}

// ✅ FINAL CONTENT
document.getElementById("content").innerHTML = `

<h2 style="text-align:center; margin-top:120px;">
  LEGAL HEIR CERTIFICATE
</h2>

<p style="text-align:center;"><b>TO WHOM IT MAY CONCERN</b></p>

<p style="text-align:justify;">
This is to certify that Late <b>${val(data.deceased)}</b>, 
<b>${relationText()}</b>, was a permanent resident of 
<b>${val(data.deadAddress)}</b>.
</p>

<p style="text-align:justify;">
He/She passed away and leaving behind the following legal heirs:
</p>

<br>

<table border="1" width="100%">
<tr>
  <th>Sl</th>
  <th>Name</th>
  <th>Age</th>
  <th>Relation</th>
  <th>Address</th>
  <th>EPIC</th>
</tr>

${heirsRows}

</table>

<br><br>

<p style="text-align:justify;">
It is further certified that, upon receipt of the application and after verification of records and field enquiry, it has been found that there are no other legal heirs, successors, or surviving members of the deceased except those mentioned above.

<br>

<p>
This certificate is issued to <b>${val(data.applicant)}</b> for official purpose.
</p>

<br><br>

<p><b>Place:</b> Deor Gram Panchayat</p>

<br><br><br><br>

<div style="
  position: absolute;
  bottom: 40px;
  right: 40px;
  text-align: right;
">
  ___________________________<br>
  Signature of Issuing Authority
</div>

`;

</script>

</body>
