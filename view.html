<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  databaseURL: "https://deor-gp-default-rtdb.firebaseio.com",
  projectId: "deor-gp",
  storageBucket: "deor-gp.firebasestorage.app",
  messagingSenderId: "119940582286",
  appId: "1:119940582286:web:f39346b6cc185809a232df"
};

// ✅ INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ URL থেকে ID নাও (certificate.html?id=XXXX)
const urlParams = new URLSearchParams(window.location.search);
const docId = urlParams.get("id");

// ✅ VALUE SAFE
function val(v){
  return v ? v : "-";
}

// 🔥 LOAD DATA FROM FIREBASE
async function loadData(){

  if(!docId){
    document.body.innerHTML = "<h2>No ID Provided</h2>";
    return;
  }

  try {
    const docRef = doc(db, "certificates", docId);
    const docSnap = await getDoc(docRef);

    if(!docSnap.exists()){
      document.body.innerHTML = "<h2>No Data Found</h2>";
      return;
    }

    const data = docSnap.data();
    renderCertificate(data);

  } catch (err){
    console.error(err);
    document.body.innerHTML = "<h2>Error Loading Data</h2>";
  }
}

// 🔥 RELATION TEXT
function relationText(data){
  if(data.relType && data.relName){
    return data.relType + " " + data.relName;
  }
  return val(data.relation);
}

// 🔥 RENDER
function renderCertificate(data){

  let heirsList = data.heirs || data.heirList || data.legalHeirs || [];

  let heirsRows = "";

  if(heirsList.length > 0){
    heirsList.forEach((h,i)=>{
      heirsRows += `
        <tr>
          <td>${i+1}</td>
          <td>${val(h.name)}</td>
          <td>${val(h.age)}</td>
          <td>${val(h.rel || h.relation)}</td>
          <td>${val(h.addr || h.address)}</td>
          <td>${val(h.epic || h.epicNo) || "N/A"}</td>
        </tr>
      `;
    });
  } else {
    heirsRows = `<tr><td colspan="6" style="text-align:center;">No Heir Data</td></tr>`;
  }

  document.getElementById("content").innerHTML = `

    <h2 style="text-align:center; margin-top:120px;">
      LEGAL HEIR CERTIFICATE
    </h2>

    <p style="text-align:center;"><b>TO WHOM IT MAY CONCERN</b></p>

    <p style="text-align:justify;">
    This is to certify that Late <b>${val(data.deceased)}</b>, 
    <b>${relationText(data)}</b>, was a permanent resident of 
    <b>${val(data.deadAddress)}</b>.
    </p>

    <p style="text-align:justify;">
    He/She passed away and leaving behind the following legal heirs:
    </p>

    <br>

    <table border="1" width="100%">
      <tr>
        <th>Sl</th>
        <th>Name</th>
        <th>Age</th>
        <th>Relation</th>
        <th>Address</th>
        <th>EPIC</th>
      </tr>

      ${heirsRows}

    </table>

    <br><br>

    <p style="text-align:justify;">
    It is further certified that, upon receipt of the application and after verification of records and field enquiry, it has been found that there are no other legal heirs except those mentioned above.
    </p>

    <p>
    This certificate is issued to <b>${val(data.applicant)}</b> for official purpose.
    </p>

    <br><br>

    <p><b>Place:</b> Deor Gram Panchayat</p>

    <br><br><br><br>

    <div style="position:absolute; bottom:40px; right:40px; text-align:right;">
      ___________________________<br>
      Signature of Issuing Authority
    </div>

  `;
}

// 🚀 RUN
loadData();

</script>
