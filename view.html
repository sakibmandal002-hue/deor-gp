<!DOCTYPE html>
<html>
<head>
  <title>Certificate View</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
    }

    #paper {
      width: 210mm;
      min-height: 297mm;
      margin: auto;
      background: white;
      padding: 20mm;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    /* ✅ WATERMARK FIX */
    #paper::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      width: 80%;
      height: 80%;

      background-image: url("letterhead.jpg"); /* 🔥 FIXED */
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;

      opacity: 0.08;
      z-index: 0;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    table {
      border-collapse: collapse;
    }

    th, td {
      padding: 6px;
      text-align: left;
    }

    @media print {
      body { background: white; }
      button { display: none; }

      /* print এ watermark clear থাকবে */
      #paper::before {
        opacity: 0.08;
      }
    }
  </style>
</head>

<body>

<button onclick="window.print()">Print</button>

<div id="paper">
  <div class="content" id="content"></div>
</div>

<script>

// ✅ SAFE DATA LOAD
let data = JSON.parse(localStorage.getItem("certData"));

if(!data){
  document.body.innerHTML = "<h2>No Data Found</h2>";
  throw new Error("No Data");
}

function val(v){
  return v ? v : "-";
}

// ✅ HEIRS TABLE
let heirsRows = "";

if(data.heirs && data.heirs.length > 0){
  data.heirs.forEach((h,i)=>{
    heirsRows += `
      <tr>
        <td>${i+1}</td>
        <td>${val(h.name)}</td>
        <td>${val(h.age)}</td>
        <td>${val(h.rel)}</td>
        <td>${val(h.addr)}</td>
        <td>${val(h.epic) || "N/A"}</td>
      </tr>
    `;
  });
} else {
  heirsRows = `<tr><td colspan="6">No Heir Data</td></tr>`;
}

// ✅ FINAL CERTIFICATE
document.getElementById("content").innerHTML = `

<br>

<p style="text-align:center;"><b>TO WHOM IT MAY CONCERN</b></p>

<p style="text-align:justify;">
This is to certify that Late <b>${val(data.deceased)}</b>, 
${val(data.relation)}, was a permanent resident of 
<b>${val(data.deadAddress)}</b>. 

He/She passed away on <b>________</b> at <b>________</b>, 
leaving behind the following legal heirs:
</p>

<br>

<table border="1" width="100%">
<tr>
  <th>Sl</th>
  <th>Name</th>
  <th>Age</th>
  <th>Relation</th>
  <th>Address</th>
  <th>EPIC</th>
</tr>

${heirsRows}

</table>

<br><br>

<p style="text-align:justify;">
It is further certified that there are no other legal heirs, successors, 
or survivors of the deceased other than those listed above.
</p>

<br>

<p>
This certificate is issued to <b>${val(data.applicant)}</b> for official purpose.
</p>

<br><br>

<p><b>Place:</b> Deor Gram Panchayat</p>

<br><br><br>

<div style="display:flex; justify-content:space-between;">
  <div>
    ___________________________<br>
    Signature of Issuing Authority
  </div>
</div>

`;

</script>

</body>
</html>
