<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  projectId: "deor-gp",
  storageBucket: "deor-gp.appspot.com",
  messagingSenderId: "119940582286",
  appId: "1:119940582286:web:f39346b6cc185809a232df"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("Login Required");
    window.location.href = "login.html";
  }
});

let allData = [];

async function loadData(){

  const snapshot = await getDocs(collection(db, "applications"));

  let table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Applicant</th>
      <th>Date</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  `;

  allData = [];

  snapshot.forEach(docSnap=>{
    let d = docSnap.data();
    let id = docSnap.id;

    allData.push({...d, docId:id});

    let status = d.status || "pending";

    let rowColor = "";
    if(status === "rejected") rowColor = "style='background:#ffcccc'";
    if(status === "approved") rowColor = "style='background:#ccffcc'";

    let disabled = status === "approved" ? "disabled" : "";

    table.innerHTML += `
      <tr ${rowColor}>
        <td>${d.ackID || "-"}</td>
        <td>${d.applicant || "-"}</td>
        <td>${
          d.createdAt?.seconds
            ? new Date(d.createdAt.seconds * 1000).toLocaleDateString()
            : "-"
        }</td>
        <td>${status}</td>
        <td>
          <button onclick='viewCert(${JSON.stringify(d)})'>View</button>
          <button ${disabled} onclick="approveApp('${id}')">Approve</button>
          <button ${disabled} onclick="rejectApp('${id}')">Reject</button>
          <button ${disabled} onclick="deleteApp('${id}')">Delete</button>
        </td>
      </tr>
    `;
  });

}

// APPROVE
window.approveApp = async function(id){
  if(confirm("Approve this application?")){
    await updateDoc(doc(db, "applications", id), {
      status: "approved"
    });
    loadData();
  }
}

// REJECT
window.rejectApp = async function(id){
  if(confirm("Reject this application?")){
    await updateDoc(doc(db, "applications", id), {
      status: "rejected"
    });
    loadData();
  }
}

// DELETE
window.deleteApp = async function(id){
  if(confirm("Delete permanently?")){
    await deleteDoc(doc(db, "applications", id));
    loadData();
  }
}

// VIEW
window.viewCert = function(data){
  localStorage.setItem("certData", JSON.stringify(data));
  window.open("view.html", "_blank");
}

// SEARCH same
window.searchData = function(){

  let val = document.getElementById("search").value.toLowerCase();
  let table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Applicant</th>
      <th>Date</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  `;

  allData
  .filter(d => d.ackID?.toLowerCase().includes(val))
  .forEach(d=>{

    let status = d.status || "pending";

    let rowColor = "";
    if(status === "rejected") rowColor = "style='background:#ffcccc'";
    if(status === "approved") rowColor = "style='background:#ccffcc'";

    let disabled = status === "approved" ? "disabled" : "";

    table.innerHTML += `
      <tr ${rowColor}>
        <td>${d.ackID}</td>
        <td>${d.applicant}</td>
        <td>${
          d.createdAt?.seconds
            ? new Date(d.createdAt.seconds * 1000).toLocaleDateString()
            : "-"
        }</td>
        <td>${status}</td>
        <td>
          <button onclick='viewCert(${JSON.stringify(d)})'>View</button>
          <button ${disabled} onclick="approveApp('${d.docId}')">Approve</button>
          <button ${disabled} onclick="rejectApp('${d.docId}')">Reject</button>
          <button ${disabled} onclick="deleteApp('${d.docId}')">Delete</button>
        </td>
      </tr>
    `;
  });

}

window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href = "login.html";
  });
}

loadData();

</script>
