<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    h2 {
      text-align: center;
    }

    input {
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 6px 10px;
      cursor: pointer;
      margin: 2px;
    }

    table {
      background: white;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<h2>Admin Dashboard</h2>

<input id="search" placeholder="Search by ID">
<button onclick="searchData()">Search</button>
<button onclick="logout()">Logout</button>

<br><br>

<table border="1" width="100%" id="table">
<tr>
  <th>ID</th>
  <th>Applicant</th>
  <th>Date</th>
  <th>Action</th>
</tr>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  projectId: "deor-gp",
  storageBucket: "deor-gp.appspot.com",
  messagingSenderId: "119940582286",
  appId: "1:119940582286:web:f39346b6cc185809a232df"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("Login Required");
    window.location.href = "login.html";
  }
});

// STORE
let allData = [];

// LOAD DATA
async function loadData(){

  const snapshot = await getDocs(collection(db, "applications"));

  let table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Applicant</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  `;

  allData = [];

  snapshot.forEach(docSnap=>{
    let d = docSnap.data();
    let id = docSnap.id;

    allData.push({...d, docId:id});

    table.innerHTML += `
      <tr>
        <td>${d.ackID || "-"}</td>
        <td>${d.applicant || "-"}</td>
        <td>${
          d.createdAt?.seconds
            ? new Date(d.createdAt.seconds * 1000).toLocaleDateString()
            : "-"
        }</td>
        <td>
          <button onclick='viewCert(${JSON.stringify(d)})'>View</button>
          <button onclick="rejectApp('${id}')">Reject</button>
          <button onclick="deleteApp('${id}')">Delete</button>
        </td>
      </tr>
    `;
  });

}

// SEARCH
window.searchData = function(){

  let val = document.getElementById("search").value.toLowerCase();
  let table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Applicant</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  `;

  allData
  .filter(d => d.ackID?.toLowerCase().includes(val))
  .forEach(d=>{
    table.innerHTML += `
      <tr>
        <td>${d.ackID}</td>
        <td>${d.applicant}</td>
        <td>${
          d.createdAt?.seconds
            ? new Date(d.createdAt.seconds * 1000).toLocaleDateString()
            : "-"
        }</td>
        <td>
          <button onclick='viewCert(${JSON.stringify(d)})'>View</button>
          <button onclick="rejectApp('${d.docId}')">Reject</button>
          <button onclick="deleteApp('${d.docId}')">Delete</button>
        </td>
      </tr>
    `;
  });

}

// VIEW
window.viewCert = function(data){
  localStorage.setItem("certData", JSON.stringify(data));
  window.open("view.html", "_blank");
}

// ❌ REJECT
window.rejectApp = async function(id){

  if(confirm("Reject this application?")){
    await updateDoc(doc(db, "applications", id), {
      status: "rejected"
    });

    alert("Application Rejected");
    loadData();
  }

}

// 🗑 DELETE
window.deleteApp = async function(id){

  if(confirm("Delete permanently?")){
    await deleteDoc(doc(db, "applications", id));

    alert("Deleted Successfully");
    loadData();
  }

}

// LOGOUT
window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href = "login.html";
  });
}

// INIT
loadData();

</script>

</body>
</html>
