<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    h2 {
      text-align: center;
    }

    input {
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      margin-left: 5px;
    }

    table {
      background: white;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<h2>Admin Dashboard</h2>

<input id="search" placeholder="Search by ID">
<button onclick="searchData()">Search</button>
<button onclick="logout()">Logout</button>

<br><br>

<table border="1" width="100%" id="table">
<tr>
  <th>ID</th>
  <th>Applicant</th>
  <th>Date</th>
  <th>Action</th>
</tr>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 SAME CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  projectId: "deor-gp",
  storageBucket: "deor-gp.appspot.com",
  messagingSenderId: "119940582286",
  appId: "1:119940582286:web:f39346b6cc185809a232df"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔒 AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("Login Required");
    window.location.href = "login.html";
  }
});

// DATA STORE
let allData = [];

// 🔥 LOAD DATA
async function loadData(){

  const snapshot = await getDocs(collection(db, "applications"));

  let table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Applicant</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  `;

  allData = [];

  snapshot.forEach(doc=>{
    let d = doc.data();
    allData.push(d);

    table.innerHTML += `
      <tr>
        <td>${d.ackID || "-"}</td>
        <td>${d.applicant || "-"}</td>
        <td>${
          d.createdAt?.seconds
            ? new Date(d.createdAt.seconds * 1000).toLocaleDateString()
            : "-"
        }</td>
        <td>
          <button onclick='viewCert(${JSON.stringify(d)})'>View</button>
        </td>
      </tr>
    `;
  });

}

// 🔍 SEARCH
window.searchData = function(){

  let val = document.getElementById("search").value.toLowerCase();

  let table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Applicant</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  `;

  allData
  .filter(d => d.ackID?.toLowerCase().includes(val))
  .forEach(d=>{
    table.innerHTML += `
      <tr>
        <td>${d.ackID}</td>
        <td>${d.applicant}</td>
        <td>${
          d.createdAt?.seconds
            ? new Date(d.createdAt.seconds * 1000).toLocaleDateString()
            : "-"
        }</td>
        <td>
          <button onclick='viewCert(${JSON.stringify(d)})'>View</button>
        </td>
      </tr>
    `;
  });

}

// 📄 VIEW CERTIFICATE
window.viewCert = function(data){

  localStorage.setItem("certData", JSON.stringify(data));
  window.open("view.html", "_blank");

}

// 🚪 LOGOUT
window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href = "login.html";
  });
}

// INIT
loadData();

</script>

</body>
</html>
