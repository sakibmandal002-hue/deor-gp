<!DOCTYPE html>
<html>
<head>
  <title>Legal Heir Application</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    h2 { text-align: center; }

    .box {
      background: #fff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button { padding: 6px 10px; margin: 3px; cursor: pointer; }

    #output {
      background: #fff;
      padding: 20px;
      margin-top: 20px;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>Legal Heir Application</h2>

<button onclick="generate()">✅ Submit</button>
<button onclick="goBack()">⬅ Back</button>
<button onclick="resetForm()">🔄 Reset</button>
<button onclick="downloadPDF()" id="pdfBtn" style="display:none;">📄 PDF</button>

<div class="box">
  <h3>Applicant Details</h3>

  <label>Applicant Name</label>
  <input id="app_name">

  <label>Father Name</label>
  <input id="father_name">

  <label>Gender</label>
  <select id="gender">
    <option value="">Select</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <label>Address</label>
  <input id="app_address">
</div>

<div class="box">
  <h3>Deceased Details</h3>

  <label>Deceased Name</label>
  <input id="dead_name">

  <label>Father/Husband/Mother</label>
  <input id="dead_parent">

  <label>Address</label>
  <input id="dead_address">
</div>

<div class="box">
  <h3>Legal Heirs</h3>

  <label>Number of Legal Heirs (Max 20)</label>
  <input type="number" id="heirCountInput" min="1" max="20">

  <div id="heirs"></div>
</div>

<div class="box">
  <label>
    <input type="checkbox" id="agreeCheck">
    above details are added by me are true and genuine.
  </label>
</div>

<div id="output"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

// FIREBASE INIT
firebase.initializeApp({
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  projectId: "deor-gp",
  storageBucket: "deor-gp.firebasestorage.app",
  messagingSenderId: "119940582286",
  appId: "1:119940582286:web:f39346b6cc185809a232df"
});

const db = firebase.firestore();

let heirCount = 0;
const MAX = 20;

// 🔥 CREATE HEIR INPUTS
document.getElementById("heirCountInput").addEventListener("input", function(){

  let count = parseInt(this.value) || 0;

  if(count > MAX){
    alert("Max 20 allowed");
    this.value = 20;
    count = 20;
  }

  heirCount = count;

  let container = document.getElementById("heirs");
  container.innerHTML = "";

  for(let i=1;i<=count;i++){
    let div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
      <b>Heir ${i}</b>
      <label>Name</label>
      <input id="name${i}">
      <label>Relation</label>
      <input id="rel${i}">
      <label>Address</label>
      <input id="addr${i}">
      <label>Age</label>
      <input id="age${i}">
      <label>EPIC (Optional)</label>
      <input id="epic${i}">
    `;
    container.appendChild(div);
  }

});

// VALUE
function val(id){
  let el=document.getElementById(id);
  return el ? el.value.trim() || "-" : "-";
}

// BACK
function goBack(){
  document.getElementById("output").innerHTML = "";
  document.getElementById("pdfBtn").style.display = "none";
}

// RESET
function resetForm(){
  document.querySelectorAll("input").forEach(el => el.value = "");
  document.querySelectorAll("select").forEach(el => el.value = "");
  document.getElementById("heirs").innerHTML = "";
  document.getElementById("output").innerHTML = "";
  document.getElementById("pdfBtn").style.display = "none";
  heirCount = 0;
}

// 🔥 MAIN GENERATE FUNCTION
function generate(){

  if(!document.getElementById("agreeCheck").checked){
    alert("Please confirm details are true and genuine");
    return;
  }

  if(heirCount===0){
    alert("Enter number of heirs");
    return;
  }

  let rows="";
  let heirsArray=[];

  for(let i=1;i<=heirCount;i++){

    let obj={
      name: val("name"+i),
      age: val("age"+i),
      rel: val("rel"+i),
      addr: val("addr"+i),
      epic: val("epic"+i)
    };

    heirsArray.push(obj);

    rows+=`
    <tr>
      <td>${i}</td>
      <td>${obj.name}</td>
      <td>${obj.age}</td>
      <td>${obj.rel}</td>
      <td>${obj.addr}</td>
      <td>${obj.epic}</td>
    </tr>`;
  }

  let d=new Date();
  let today=d.toLocaleDateString("en-GB");

  let genderText = "son/daughter";
  if(val("gender") === "Male") genderText = "son of";
  else if(val("gender") === "Female") genderText = "daughter of";

  // OUTPUT (UNCHANGED)
  document.getElementById("output").innerHTML = `
<h2 style="text-align:center;">LEGAL HEIR APPLICATION FORM</h2>

<div style="text-align:center; margin-bottom:15px; font-weight:bold;">
  Date: ${today}
</div>

<p><b>To</b><br>
The Pradhan<br>
Deor Gram Panchayat</p>

<p style="text-align:center;"><b>Subject: Application for Issuance of Legal Heir Certificate</b></p>

<p>
I, <b>${val("app_name")}</b>, ${genderText} <b>${val("father_name")}</b>,
resident of <b>${val("app_address")}</b>, do hereby state that 
<b>Late ${val("dead_name")}</b>, 
was resident of <b>${val("dead_address")}</b> I hereby declare that apart from the following persons mentioned below, there is no other legal heir of the deceased..
</p>

<table border="1" width="100%" cellpadding="5">
<tr>
<th>Sl</th>
<th>Name</th>
<th>Age</th>
<th>Relation</th>
<th>Address</th>
<th>EPIC</th>
</tr>
${rows}
</table>

<br><br>

<p>Place: Deor Gram Panchayat</p>

<br><br>

<p style="text-align:justify;">
<b>Declaration:</b><br>
I hereby declare that the information provided above is true and correct to the best of my knowledge and belief. 
If any information is found to be incorrect or false, I shall be liable for legal action as per law. 
I therefore request the competent authority to kindly verify my application at the earliest and issue the Legal Heir Certificate in my favour.
</p>

<br><br>

<div style="text-align:right;">
_________________________<br>
Signature of Applicant<br>
${val("app_name")}
</div>

<br><br><br>

<div style="border:1px solid #000; padding:15px;">
<b>Signature of Witness</b>

<table width="100%" style="margin-top:10px;">
<tr>
<td>
1. _________________________<br><br>
2. _________________________<br><br>
3. _________________________
</td>

<td align="right">
4. _________________________<br><br>
5. _________________________<br><br>
6. _________________________
</td>
</tr>
</table>
</div>

<br><br><br>

<table width="100%">
<tr>
<td>
_________________________<br>
Signature of Member
</td>

<td align="right">
_________________________<br>
Signature of Pradhan
</td>
</tr>
</table>
`;

  document.getElementById("pdfBtn").style.display = "inline-block";

  // 🔥 SAVE FULL DATA TO FIREBASE
  db.collection("applications").add({
    applicant: val("app_name"),
    father_name: val("father_name"),
    gender: val("gender"),
    app_address: val("app_address"),

    deceased: val("dead_name"),
    dead_parent: val("dead_parent"),
    deadAddress: val("dead_address"),

    heirs: heirsArray,

    status: "pending",
    createdAt: new Date()
  }).then(docRef=>{
    window.location.href = `certificate.html?id=${docRef.id}`;
  });

  alert("✅ Submitted Successfully");
}

// PDF
function downloadPDF(){
  const element = document.getElementById("output");

  html2pdf().set({
    margin: 5,
    filename: 'Legal_Heir_Application.pdf',
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(element).save();
}

</script>

</body>
</html>
