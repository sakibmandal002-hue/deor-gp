<!DOCTYPE html>
<html>
<head>
  <title>Legal Heir Application</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    @page {
      size: A4;
      margin: 15mm;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 180px;
      height: 100%;
      background: #222;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }

    .home { background: orange; }
    .submit { background: green; }
    .reset { background: red; }
    .pdf { background: blue; display: none; }

    .main {
      margin-left: 200px;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    #output {
      width: 210mm;
      min-height: 297mm;
      margin: auto;
      background: white;
      padding: 15mm;
      box-sizing: border-box;
    }

    @media print {
      .sidebar, .no-print {
        display: none;
      }

      .main {
        margin: 0;
        padding: 0;
      }
    }
  </style>
</head>

<body>

<div class="sidebar no-print">
  <button class="home" onclick="goHome()">Home</button>
  <button class="reset" onclick="resetForm()">Reset</button>
  <button class="submit" onclick="generate()">Submit</button>
  <button class="pdf" id="printBtn" onclick="printPage()">Print</button>
</div>

<div class="main">

<h2 class="no-print">Legal Heir Application</h2>

<div class="box no-print">

<h3>Applicant</h3>
<input id="app_name" placeholder="Applicant Name">
<input id="father_name" placeholder="Father Name">
<input id="app_address" placeholder="Address">

<h3>Deceased</h3>
<input id="dead_name" placeholder="Deceased Name">
<input id="relation_name" placeholder="Father/Husband Name">
<input id="dead_address" placeholder="Last Address">

<h3>No. of Legal Heirs</h3>
<input type="number" id="count" min="1" oninput="createHeirs()">

<div id="heirs"></div>

</div>

<div id="output"></div>

</div>

<script>

// HOME
function goHome(){
  window.location.href = "./index.html";
}

// RESET
function resetForm(){
  location.reload();
}

// CREATE HEIRS
function createHeirs(){
  let c = parseInt(document.getElementById("count").value) || 0;
  let h = document.getElementById("heirs");
  h.innerHTML = "";

  if(c <= 0) return;

  for(let i=1;i<=c;i++){
    h.innerHTML += `
      <div class="box">
        <h4>Heir ${i}</h4>
        <input id="name${i}" placeholder="Name">
        <input id="age${i}" placeholder="Age">
        <input id="rel${i}" placeholder="Relation">
        <input id="addr${i}" placeholder="Address">
        <input id="epic${i}" placeholder="EPIC">
      </div>
    `;
  }
}

// VALUE
function val(id){
  let el = document.getElementById(id);
  return el && el.value ? el.value : "-";
}

// GENERATE
function generate(){

 


  let c = parseInt(document.getElementById("count").value) || 0;

  if(c <= 0){
    alert("Please enter number of heirs");
    return;
  }

  let rows = "";

  for(let i=1;i<=c;i++){
    rows += `
      <tr>
        <td>${i}</td>
        <td>${val("name"+i)}</td>
        <td>${val("age"+i)}</td>
        <td>${val("rel"+i)}</td>
        <td>${val("addr"+i)}</td>
        <td>${val("epic"+i)}</td>
      </tr>
    `;
  }

  document.getElementById("output").innerHTML = `
  
  <!-- PAGE 1: APPLICATION -->
  <div style="page-break-after: always;">

  <h2 style="text-align:center;">Application for Legal Heir Certificate</h2>

  <p>
  To,<br>
  The Prodhan,<br>
  Deor Gram Panchayat<br>
  Vill-Jarlai, P.O-Deor, P.S-Kumarganj,<br>
  Dist-Dakshin Dinajpur, Pin-733140
  </p>

  <p style="text-align:center;"><b>Subject:</b> Application for issuance of Legal Heir Certificate.</p>

  <p>
  <b>Name of the Applicant:</b> ${val("app_name")}<br>
  <b>Father's Name:</b> ${val("father_name")}<br>
  <b>Address:</b> ${val("app_address")}
  </p>

  <h4>Details of the Deceased</h4>
  <p>
  <b>Name:</b> ${val("dead_name")}<br>
  <b>Father/Husband Name:</b> ${val("relation_name")}<br>
  <b>Last Address:</b> ${val("dead_address")}
  </p>

  <h4>List of Legal Heirs</h4>

  <table border="1" width="100%" cellspacing="0" cellpadding="5">
    <tr>
      <th>Sl No</th>
      <th>Name</th>
      <th>Age</th>
      <th>Relation</th>
      <th>Address</th>
      <th>EPIC</th>
    </tr>
    ${rows}
  </table>

  <br>

  <p><b>Purpose of Certificate:</b> Official Purpose</p>

  <br>

  <div style="display:flex; justify-content:space-between;">
    <div>Date: ____________</div>
    <div>Place: ____________</div>
  </div>

  <br><br>

  <p style="text-align:right;">Signature of Applicant</p>

  </div>


  <!-- PAGE 2: SELF DECLARATION -->
  <div>

  <h2 style="text-align:center;">SELF DECLARATION</h2>

  <p>
  I, <b>${val("app_name")}</b>, son/daughter of <b>${val("father_name")}</b>, 
  resident of <b>${val("app_address")}</b>, do hereby solemnly affirm and declare that:
  </p>

  <ol>
    <li>That Late <b>${val("dead_name")}</b>, son/daughter/spouse of <b>${val("relation_name")}</b>, 
    resident of <b>${val("dead_address")}</b>, expired on ________.</li>

    <li>That the following persons are the only legal heirs of the deceased:</li>
  </ol>

  <table border="1" width="100%" cellspacing="0" cellpadding="5">
    <tr>
      <th>Sl No</th>
      <th>Name</th>
      <th>Relation</th>
    </tr>
    ${
      Array.from({length: c}, (_,i)=>`
      <tr>
        <td>${i+1}</td>
        <td>${val("name"+(i+1))}</td>
        <td>${val("rel"+(i+1))}</td>
      </tr>
      `).join("")
    }
  </table>

  <br>

  <ol start="3">
    <li>That I declare that the above information is true and correct.</li>
    <li>That nothing has been concealed.</li>
  </ol>

  <br><br>

  <div style="display:flex; justify-content:space-between;">
    <div>Date: ____________</div>
    <div>Place: ____________</div>
  </div>

  <br><br>

  <p style="text-align:right;">
  Signature of Deponent<br><br>
  (${val("app_name")})
  </p>

  </div>
  `;


  document.getElementById("printBtn").style.display = "block";
}

// PRINT
function printPage(){
  window.print();
}

</script>

</body>
</html>
