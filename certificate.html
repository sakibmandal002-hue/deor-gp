<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  projectId: "deor-gp",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// HOME
window.goHome = function(){
  window.location.href = "index.html";
}

// RESET
window.resetForm = function(){
  location.reload();
}

// CREATE HEIRS
window.createHeirs = function(){
  let c = document.getElementById("count").value;
  let h = document.getElementById("heirs");
  h.innerHTML = "";

  for(let i=1;i<=c;i++){
    h.innerHTML += `
      <div class="box">
        <h4>Heir ${i}</h4>
        <input id="name${i}" placeholder="Name">
        <input id="age${i}" placeholder="Age">
        <input id="rel${i}" placeholder="Relation">
        <input id="addr${i}" placeholder="Address">
        <input id="epic${i}" placeholder="EPIC">
      </div>
    `;
  }
}

// VALUE
function val(id){
  return document.getElementById(id)?.value || "-";
}

// GENERATE + SAVE
window.generate = async function(){

  let c = parseInt(document.getElementById("count").value) || 0;

  if(c <= 0){
    alert("Enter number of heirs");
    return;
  }

  let rows = "";
  let heirsData = [];

  for(let i=1;i<=c;i++){
    rows += `
      <tr>
        <td>${i}</td>
        <td>${val("name"+i)}</td>
        <td>${val("age"+i)}</td>
        <td>${val("rel"+i)}</td>
        <td>${val("addr"+i)}</td>
        <td>${val("epic"+i)}</td>
      </tr>
    `;

    heirsData.push({
      name: val("name"+i),
      age: val("age"+i),
      relation: val("rel"+i),
      address: val("addr"+i),
      epic: val("epic"+i)
    });
  }

  let now = new Date();
  let ackID = "DGP-" + Date.now();

  try{

    await addDoc(collection(db, "applications"), {
      ackID: ackID,
      applicant: val("app_name"),
      fatherName: val("father_name"),
      address: val("app_address"),
      deceased: val("dead_name"),
      relation: val("relation_name"),
      deadAddress: val("dead_address"),
      heirs: heirsData,
      status: "pending",
      createdAt: now
    });

     document.getElementById("output").innerHTML = `

<h2 style="text-align:center;">LEGAL HEIR APPLICATION FORM</h2>

<br>

<p><b>To</b><br>
The Pradhan<br>
Deor Gram Panchayat<br>
Kumarganj Development Block<br>
Dakshin Dinajpur
</p>

<br>

<p style="text-align:center;"><b>Subject: Application for Issuance of Legal Heir Certificate</b></p>

<br>

<p>Respected Sir/Madam,</p>

<p>
I, <b>${val("app_name")}</b>, son/daughter of <b>${val("father_name")}</b>, resident of <b>${val("app_address")}</b>, do hereby state that <b>Late ${val("dead_name")}</b>, <b>${val("relation_name")}</b>, was a permanent resident of <b>${val("dead_address")}</b>.
</p>

<p>The following are the legal heirs:</p>

<br>

<table border="1" width="100%" cellpadding="5">
<tr>
<th>Sl</th>
<th>Name</th>
<th>Age</th>
<th>Relation</th>
<th>Address</th>
<th>EPIC</th>
</tr>
${rows}
</table>

<br>

<p>I hereby declare that the above information is true to the best of my knowledge. Kindly issue the Legal Heir Certificate.
</p>

<br><br> I request you to kindly issue the Legal Heir Certificate.</p>

<br><br>

<p>Date: ${new Date().toLocaleDateString()}</p>
<p>Place: Deor Gram Panchayat</p>

<br><br><br>

<div style="text-align:right;">
_________________________<br>
Signature of Applicant<br>
${val("app_name")}
</div>

<br><br><br>

<table width="100%">
<tr>
<td>

_________________________<br>
Witness 1<br><br>

_________________________<br>
Witness 2<br><br>

_________________________<br>
Witness 3

</td>

<td align="right">

_________________________<br>
Witness 4<br><br>

_________________________<br>
Witness 5<br><br>

_________________________<br>

</td>
</tr>
</table>

<br><br>

<table width="100%">

_________________________<br>
Signature of Pradhan
</td>

<td align="right">
_________________________<br>
Signature of Member
</td>
</tr>
</table>

`;

       document.getElementById("printBtn").style.display = "block";

    alert("✅ Submitted Successfully");

  }catch(err){
    alert("Error: " + err.message);
  }

}

// PRINT
window.printPage = function(){
  window.print();
}

</script>
