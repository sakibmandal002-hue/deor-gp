<!DOCTYPE html>
<html>
<head>
  <title>Legal Heir Application</title>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    @page {
      size: A4;
      margin: 15mm;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 180px;
      height: 100%;
      background: #222;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }

    .home { background: orange; }
    .submit { background: green; }
    .reset { background: red; }
    .pdf { background: blue; display: none; }

    .main {
      margin-left: 200px;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    #output {
      width: 210mm;
      min-height: 297mm;
      margin: auto;
      background: white;
      padding: 15mm;
      box-sizing: border-box;
    }

    @media print {
      .sidebar, .no-print {
        display: none;
      }

      .main {
        margin: 0;
        padding: 0;
      }
    }
  </style>
</head>

<body>

<div class="sidebar no-print">
  <button type="button" class="home" onclick="goHome()">Home</button>
  <button type="button" class="reset" onclick="resetForm()">Reset</button>
  <button type="button" class="submit" onclick="generate()">Submit</button>
  <button type="button" class="pdf" id="printBtn" onclick="printPage()">Print</button>
</div>

<div class="main">

<h2 class="no-print">Legal Heir Application</h2>

<div class="box no-print">

<h3>Applicant</h3>
<input id="app_name" placeholder="Applicant Name">
<input id="father_name" placeholder="Father Name">
<input id="app_address" placeholder="Address">

<h3>Deceased</h3>
<input id="dead_name" placeholder="Deceased Name">
<input id="relation_name" placeholder="Relation">
<input id="dead_address" placeholder="Last Address">

<h3>No. of Legal Heirs</h3>
<input type="number" id="count" min="1" oninput="createHeirs()">

<div id="heirs"></div>

</div>

<div id="output"></div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  databaseURL: "https://deor-gp-default-rtdb.firebaseio.com/",
  projectId: "deor-gp",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// HOME
function goHome(){
  window.location.href = "index.html";
}

// RESET
function resetForm(){
  location.reload();
}

// CREATE HEIRS
function createHeirs(){
  let c = document.getElementById("count").value;
  let h = document.getElementById("heirs");
  h.innerHTML = "";

  for(let i=1;i<=c;i++){
    h.innerHTML += `
      <div class="box">
        <h4>Heir ${i}</h4>
        <input id="name${i}" placeholder="Name">
        <input id="age${i}" placeholder="Age">
        <input id="rel${i}" placeholder="Relation">
        <input id="addr${i}" placeholder="Address">
        <input id="epic${i}" placeholder="EPIC">
      </div>
    `;
  }
}

// VALUE
function val(id){
  return document.getElementById(id)?.value || "-";
}

// GENERATE + SAVE
function generate(){

  let c = parseInt(document.getElementById("count").value) || 0;

  if(c <= 0){
    alert("Enter number of heirs");
    return;
  }

  let rows = "";
  let heirsData = [];

  for(let i=1;i<=c;i++){
    rows += `
      <tr>
        <td>${i}</td>
        <td>${val("name"+i)}</td>
        <td>${val("age"+i)}</td>
        <td>${val("rel"+i)}</td>
        <td>${val("addr"+i)}</td>
        <td>${val("epic"+i)}</td>
      </tr>
    `;

    heirsData.push({
      name: val("name"+i),
      age: val("age"+i)
    });
  }

  let now = new Date();
  let ackID = "DGP-" + now.getTime();

  db.ref("applications/" + ackID).set({
    ackID,
    applicant: val("app_name"),
    heirs: heirsData,
    createdAt: now.toISOString()
  })
  .then(()=>{

    document.getElementById("output").innerHTML = `

<h2 style="text-align:center;">LEGAL HEIR APPLICATION FORM</h2>

<br>

<p><b>To</b><br>
The Pradhan<br>
Deor Gram Panchayat<br>
Kumarganj Development Block<br>
Dakshin Dinajpur
</p>

<br>

<p style="text-align:center;"><b>Subject: Application for Issuance of Legal Heir Certificate</b></p>

<br>

<p>Respected Sir/Madam,</p>

<p>
I, <b>${val("app_name")}</b>, son/daughter of <b>${val("father_name")}</b>, resident of <b>${val("app_address")}</b>, do hereby state that <b>Late ${val("dead_name")}</b>, <b>${val("relation_name")}</b>, was a permanent resident of <b>${val("dead_address")}</b>.
</p>

<p>The following are the legal heirs:</p>

<br>

<table border="1" width="100%" cellpadding="5">
<tr>
<th>Sl</th>
<th>Name</th>
<th>Age</th>
<th>Relation</th>
<th>Address</th>
<th>EPIC</th>
</tr>
${rows}
</table>

<br>

<p>I hereby declare that the above information is true to the best of my knowledge. Kindly issue the Legal Heir Certificate.
</p>

<br><br> I request you to kindly issue the Legal Heir Certificate.</p>

<br><br>

<p>Date: ${new Date().toLocaleDateString()}</p>
<p>Place: Deor Gram Panchayat</p>

<br><br><br>

<div style="text-align:right;">
_________________________<br>
Signature of Applicant<br>
${val("app_name")}
</div>

<br><br><br>

<table width="100%">
<tr>
<td>

_________________________<br>
Witness 1<br><br>

_________________________<br>
Witness 2<br><br>

_________________________<br>
Witness 3

</td>

<td align="right">

_________________________<br>
Witness 4<br><br>

_________________________<br>
Witness 5<br><br>

_________________________<br>
Witness 6

</td>
</tr>
</table>

<br><br>

<table width="100%">
<tr>
<td>
_________________________<br>
Signature of Pradhan
</td>

<td align="right">
_________________________<br>
Signature of Member
</td>
</tr>
</table>

`;

    document.getElementById("printBtn").style.display = "block";

    alert("✅ Submitted Successfully");

  })
  .catch(err=>{
    alert("Error: " + err.message);
  });

}

// PRINT
function printPage(){
  window.print();
}

</script>

</body>
</html>
