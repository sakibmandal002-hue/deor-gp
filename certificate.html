<!DOCTYPE html>
<html>
<head>
  <title>Legal Heir Application</title>

  <!-- 🔥 FIREBASE ADD -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    @page {
      size: A4;
      margin: 15mm;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 180px;
      height: 100%;
      background: #222;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }

    .home { background: orange; }
    .submit { background: green; }
    .reset { background: red; }
    .pdf { background: blue; display: none; }

    .main {
      margin-left: 200px;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    #output {
      width: 210mm;
      min-height: 297mm;
      margin: auto;
      background: white;
      padding: 15mm;
      box-sizing: border-box;
    }

    @media print {
      .sidebar, .no-print {
        display: none;
      }

      .main {
        margin: 0;
        padding: 0;
      }
    }
  </style>
</head>

<body>

<div class="sidebar no-print">
  <button class="home" onclick="goHome()">Home</button>
  <button class="reset" onclick="resetForm()">Reset</button>
  <button class="submit" onclick="generate()">Submit</button>
  <button class="pdf" id="printBtn" onclick="printPage()">Print</button>
</div>

<div class="main">

<h2 class="no-print">Legal Heir Application</h2>

<div class="box no-print">

<h3>Applicant</h3>
<input id="app_name" placeholder="Applicant Name">
<input id="father_name" placeholder="Father Name">
<input id="app_address" placeholder="Address">

<h3>Deceased</h3>
<input id="dead_name" placeholder="Deceased Name">
<input id="relation_name" placeholder="Father/Husband Name">
<input id="dead_address" placeholder="Last Address">

<h3>No. of Legal Heirs</h3>
<input type="number" id="count" min="1" oninput="createHeirs()">

<div id="heirs"></div>

</div>

<div id="output"></div>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  databaseURL: "https://deor-gp-default-rtdb.firebaseio.com/",
  projectId: "deor-gp",
  storageBucket: "deor-gp.firebasestorage.app",
  messagingSenderId: "119940582286",
  appId: "1:119940582286:web:f39346b6cc185809a232df"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

// HOME
function goHome(){
  window.location.href = "index.html";
}

// RESET
function resetForm(){
  location.reload();
}

// CREATE HEIRS
function createHeirs(){
  let c = document.getElementById("count").value;
  let h = document.getElementById("heirs");
  h.innerHTML = "";

  for(let i=1;i<=c;i++){
    h.innerHTML += `
      <div class="box">
        <h4>Heir ${i}</h4>
        <input id="name${i}" placeholder="Name">
        <input id="age${i}" placeholder="Age">
        <input id="rel${i}" placeholder="Relation">
        <input id="addr${i}" placeholder="Address">
        <input id="epic${i}" placeholder="EPIC">
      </div>
    `;
  }
}

// VALUE
function val(id){
  return document.getElementById(id)?.value || "-";
}

// 🔥 GENERATE + SAVE
function generate(){

  let c = parseInt(document.getElementById("count").value) || 0;

  if(c <= 0){
    alert("Please enter number of heirs");
    return;
  }

  let rows = "";
  let heirsData = [];

  for(let i=1;i<=c;i++){
    rows += `
      <tr>
        <td>${i}</td>
        <td>${val("name"+i)}</td>
        <td>${val("age"+i)}</td>
        <td>${val("rel"+i)}</td>
        <td>${val("addr"+i)}</td>
        <td>${val("epic"+i)}</td>
      </tr>
    `;

    heirsData.push({
      name: val("name"+i),
      age: val("age"+i),
      relation: val("rel"+i),
      address: val("addr"+i),
      epic: val("epic"+i)
    });
  }

  // 🔥 ACK ID
  let now = new Date();
  let year = now.getFullYear();
  let serial = now.getTime().toString().slice(-6);
  let ackID = `${year}-DGP-LHA-${serial}`;

  // 🔥 SAVE TO FIREBASE
  db.ref("applications/" + ackID).set({
    ackID,
    applicantName: val("app_name"),
    fatherName: val("father_name"),
    applicantAddress: val("app_address"),
    deceasedName: val("dead_name"),
    deceasedRelation: val("relation_name"),
    deceasedAddress: val("dead_address"),
    heirs: heirsData,
    status: "Pending",
    createdAt: now.toISOString()
  })
  .then(()=>{

    document.getElementById("output").innerHTML = `
    <h2 style="text-align:center;">Application for Legal Heir Certificate</h2>
    <p style="color:green;"><b>Acknowledgement ID:</b> ${ackID}</p>
    `;

    document.getElementById("printBtn").style.display = "block";

    alert("✅ Application Submitted Successfully!");

  })
  .catch(err=>{
    alert("❌ Error: " + err.message);
  });

}

// PRINT
function printPage(){
  window.print();
}

</script>

</body>
</html>
