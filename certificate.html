<!DOCTYPE html>
<html>
<head>
  <title>Legal Heir Application</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 180px;
      height: 100%;
      background: #222;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .submit { background: green; color: white; }
    .reset { background: red; color: white; }
    .pdf { background: blue; color: white; display: none; }

    .main {
      margin-left: 200px;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    #output {
      width: 210mm;
      min-height: 297mm;
      margin: auto;
      background: white;
      padding: 25mm;
      box-sizing: border-box;
    }

    @media print {
      .sidebar { display: none; }
      .no-print { display: none; }
      .main { margin: 0; }
      body { background: white; }
    }
  </style>
</head>

<body>

<div class="sidebar no-print">
  <button class="reset" onclick="resetForm()">Reset</button>
  <button class="submit" onclick="generate()">Submit</button>
  <button class="pdf" id="printBtn" onclick="printPage()">Print</button>
</div>

<div class="main">

<h2 class="no-print">Legal Heir Application</h2>

<div class="box no-print">

<h3>Applicant</h3>
<input id="app_name" placeholder="Applicant Name">
<input id="app_address" placeholder="Address">
<input id="father_name" placeholder="Father Name">

<h3>Deceased</h3>
<input id="dead_name" placeholder="Deceased Name">
<input id="relation_name" placeholder="Father/Husband/Mother Name">
<input id="dead_address" placeholder="Address">

<h3>Number of Legal Heirs</h3>
<input type="number" id="count" min="1" placeholder="Enter number" oninput="createHeirs()">

<div id="heirs"></div>

</div>

<div id="output"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  projectId: "deor-gp",
  storageBucket: "deor-gp.appspot.com",
  messagingSenderId: "119940582286",
  appId: "1:119940582286:web:f39346b6cc185809a232df"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SERIAL ID
async function generateID(){
  const snapshot = await getDocs(collection(db, "applications"));
  let max = 0;

  snapshot.forEach(doc => {
    let id = doc.data().ackID;
    if(id){
      let num = parseInt(id.split("-").pop());
      if(num > max) max = num;
    }
  });

  let next = max + 1;
  return "2026-DGP-LHA-" + String(next).padStart(3,'0');
}

// RESET
window.resetForm = () => location.reload();

// 🔥 UNLIMITED HEIRS
window.createHeirs = function(){

  let count = parseInt(document.getElementById("count").value);
  let container = document.getElementById("heirs");

  container.innerHTML = "";

  if(!count || count < 1) return;

  for(let i=1;i<=count;i++){
    container.innerHTML += `
      <div class="box">
        <h4>Legal Heir ${i}</h4>
        <input id="name${i}" placeholder="Name">
        <input id="rel${i}" placeholder="Relation">
        <input id="addr${i}" placeholder="Address">
        <input id="age${i}" placeholder="Age">
        <input id="epic${i}" placeholder="EPIC (Optional)">
      </div>
    `;
  }
}

// GENERATE
window.generate = async function(){

  let ackID = await generateID();
  let now = new Date();
  let count = parseInt(document.getElementById("count").value) || 0;

  function val(id){ return document.getElementById(id)?.value || "-" }

  let heirs = [];
  let heirsHTML = "";

  for(let i=1;i<=count;i++){

    let h = {
      name: val("name"+i),
      rel: val("rel"+i),
      age: val("age"+i),
      epic: val("epic"+i),
      addr: val("addr"+i)
    };

    heirs.push(h);

    heirsHTML += `
      <p><b>Legal Heir ${i}:</b>
      ${h.name}, ${h.rel}, Age: ${h.age},
      EPIC: ${h.epic || "N/A"},
      Address: ${h.addr}</p>
    `;
  }

  // OUTPUT PREVIEW
 document.getElementById("output").innerHTML = `

<div style="width:210mm; min-height:297mm; padding:20mm; font-family:Arial;">

<h2 style="text-align:center;">Application for Legal Heir Certificate</h2>

<p>To,<br>
The Prodhan,<br>
Deor Gram Panchayat<br>
Vill-Jarlai, P.O-Deor, P.S-Kumarganj,<br>
Dist-Dakshin Dinajpur, Pin-733140
</p>

<p><b>Subject:</b> Application for issuance of Legal Heir Certificate.</p>

<br>

<p><b>Name of the Applicant:</b> ${val("app_name")}</p>
<p><b>Father's Name of the Applicant:</b> ${val("father_name")}</p>
<p><b>Address of the Applicant:</b> ${val("app_address")}</p>

<br>

<h4>Details of the Deceased:</h4>

<p><b>Name of the Deceased:</b> ${val("dead_name")}</p>
<p><b>Father/Husband's Name:</b> ${val("relation_name")}</p>
<p><b>Last Residential Address:</b> ${val("dead_address")}</p>

<br>

<h4>List of Legal Heirs:</h4>

<table border="1" width="100%" cellspacing="0" cellpadding="6">
<tr>
<th>Sl. No</th>
<th>Name of Legal Heir</th>
<th>Age</th>
<th>Relationship</th>
<th>Address</th>
<th>EPIC</th>
</tr>

${heirs.map((h,i)=>`
<tr>
<td>${i+1}</td>
<td>${h.name}</td>
<td>${h.age}</td>
<td>${h.rel}</td>
<td>${h.addr}</td>
<td>${h.epic || "N/A"}</td>
</tr>
`).join("")}

</table>

<br>

<p><b>Purpose of Certificate:</b> Official Purpose</p>

<br>

<h4>List of Documents Attached:</h4>

<p>
☐ Death Certificate (if available)<br>
☐ Identity Proof (Aadhaar/PAN/Voter ID)<br>
☐ Address Proof<br>
☐ Self-Affidavit / Undertaking
</p>

<br>

<h4>Declaration</h4>

<p style="text-align:justify;">
I hereby declare that the information above is true to the best of my knowledge and belief.
</p>

<br><br>

<p><b>Date:</b> ${formattedDate}</p>
<p><b>Place:</b> Deor Gram Panchayat</p>

<br><br><br>

<div style="display:flex; justify-content:space-between;">
  <div>
    ___________________________<br>
    Signature of Applicant
  </div>
</div>

<br><br>

<h4>Witness:</h4>

1. ___________________________<br><br>
2. ___________________________<br><br>
3. ___________________________<br><br>
4. ___________________________<br><br>
5. ___________________________

<br><br><br>

<div style="display:flex; justify-content:space-between;">
  <div>
    ___________________________<br>
    Signature of Member
  </div>

  <div style="text-align:right;">
    ___________________________<br>
    Signature of Pradhan
  </div>
</div>

</div>
`;


  // 🔥 SAVE FULL DATA
  await addDoc(collection(db, "applications"), {
    ackID,
    applicant: val("app_name"),
    address: val("app_address"),
    father: val("father_name"),
    deceased: val("dead_name"),
    relation: val("relation_name"),
    deadAddress: val("dead_address"),
    heirs: heirs,
    createdAt: new Date()
  });

  document.getElementById("printBtn").style.display = "block";
}

// PRINT
window.printPage = function(){
  window.print();
}

</script>

</body>
</html>
