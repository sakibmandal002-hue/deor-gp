<!DOCTYPE html>
<html>
<head>
  <title>Legal Heir Application</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    h2 { text-align: center; }

    .box {
      background: #fff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    input.error, select.error {
      border: 2px solid red;
    }

    label.required::after {
      content: " *";
      color: red;
    }

    button {
      padding: 6px 10px;
      margin: 3px;
      cursor: pointer;
      font-weight: bold;
    }

    #output {
      background: #fff;
      padding: 20px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>Legal Heir Application</h2>

<button onclick="goHome()">⬅ Back</button>
<button onclick="resetForm()">🔄 Reset</button>
<button onclick="generate()">✅ Submit</button>
<button onclick="downloadPDF()" id="pdfBtn" style="display:none;">📄 PDF</button>

<div class="box">
  <h3>Applicant Details</h3>

  <label class="required">Applicant Name</label>
  <input id="app_name">

  <label class="required">Father Name</label>
  <input id="father_name">

  <label class="required">Gender</label>
  <select id="gender">
    <option value="">Select</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>

  <label class="required">Address</label>
  <input id="app_address">
</div>

<div class="box">
  <h3>Deceased Details</h3>

  <label class="required">Deceased Name</label>
  <input id="dead_name">

  <label class="required">Father/Husband/Mother</label>
  <input id="dead_parent">

  <label class="required">Address</label>
  <input id="dead_address">
</div>

<div class="box">
  <h3>Legal Heirs</h3>
  <div id="heirs"></div>
</div>

<div id="output"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7...",
  authDomain: "deor-gp.firebaseapp.com",
  projectId: "deor-gp"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let heirCount = 0;
const MAX_HEIRS = 20;

window.goHome = () => window.location.href = "index.html";
window.resetForm = () => location.reload();

// validation
function checkField(id){
  let el = document.getElementById(id);
  if(!el) return true;

  if(el.value.trim() === ""){
    el.classList.add("error");
    return false;
  } else {
    el.classList.remove("error");
    return true;
  }
}

function attachLiveValidation(id){
  let el = document.getElementById(id);
  if(el){
    el.addEventListener("input", () => checkField(id));
  }
}

// ADD HEIR
window.addHeir = function(){

  if(heirCount >= MAX_HEIRS){
    alert("❌ Maximum 20 heirs allowed");
    return;
  }

  heirCount++;

  let div = document.createElement("div");
  div.className = "box";
  div.id = "heir" + heirCount;

  div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <b>Heir ${heirCount}</b>

      <div>
        <button type="button" onclick="addHeir()" style="background:green;color:white;border:none;border-radius:5px;">➕ Add</button>
        <button type="button" onclick="removeHeir(${heirCount})" style="background:red;color:white;border:none;border-radius:5px;">❌ Remove</button>
      </div>
    </div>

    <label class="required">Name</label>
    <input id="name${heirCount}">

    <label class="required">Relation</label>
    <input id="rel${heirCount}">

    <label class="required">Address</label>
    <input id="addr${heirCount}">

    <label class="required">Age</label>
    <input id="age${heirCount}">

    <label>EPIC (Optional)</label>
    <input id="epic${heirCount}">
  `;

  document.getElementById("heirs").appendChild(div);

  attachLiveValidation("name"+heirCount);
  attachLiveValidation("rel"+heirCount);
  attachLiveValidation("addr"+heirCount);
  attachLiveValidation("age"+heirCount);
};

// REMOVE
window.removeHeir = function(id){
  let el = document.getElementById("heir"+id);
  if(el){
    el.remove();
    heirCount--;
  }
};

function val(id){
  let el = document.getElementById(id);
  return el ? el.value.trim() || "-" : "-";
}

function validateForm(){

  let valid = true;

  let fields = [
    "app_name","father_name","gender","app_address",
    "dead_name","dead_parent","dead_address"
  ];

  fields.forEach(id=>{
    if(!checkField(id)) valid = false;
  });

  for(let i=1;i<=heirCount;i++){
    if(document.getElementById("name"+i)){
      if(!checkField("name"+i)) valid = false;
      if(!checkField("rel"+i)) valid = false;
      if(!checkField("addr"+i)) valid = false;
      if(!checkField("age"+i)) valid = false;
    }
  }

  return valid;
}

// SUBMIT
window.generate = async function(){

  if(heirCount === 0){
    alert("Add at least 1 heir");
    return;
  }

  if(!validateForm()){
    alert("❌ Please fill all required fields");
    return;
  }

  let rows = "";
  let serial = 1;

  for(let i=1;i<=heirCount;i++){
    if(document.getElementById("name"+i)){
      rows += `
      <tr>
        <td>${serial++}</td>
        <td>${val("name"+i)}</td>
        <td>${val("age"+i)}</td>
        <td>${val("rel"+i)}</td>
        <td>${val("addr"+i)}</td>
        <td>${val("epic"+i)}</td>
      </tr>`;
    }
  }

  let now = new Date();
  let today = now.toLocaleDateString("en-GB");
  let ackID = `${now.getFullYear()}-DGP-LHA-${Date.now().toString().slice(-5)}`;

  await addDoc(collection(db, "applications"), {
    ackID,
    applicant: val("app_name"),
    fatherName: val("father_name"),
    createdAt: serverTimestamp()
  });

  document.getElementById("output").innerHTML = `

<h2 style="text-align:center;">LEGAL HEIR APPLICATION FORM</h2>

<div style="text-align:center; margin-bottom:15px; font-weight:bold;">
  Acknowledgement No: ${ackID} <br>
  Date: ${today}
</div>

<p><b>To</b><br>
The Pradhan<br>
Deor Gram Panchayat</p>

<p style="text-align:center;"><b>Subject: Application for Issuance of Legal Heir Certificate</b></p>

<p>
I, <b>${val("app_name")}</b>, son/daughter of <b>${val("father_name")}</b>,
resident of <b>${val("app_address")}</b>, do hereby state that 
<b>Late ${val("dead_name")}</b>, 
was resident of <b>${val("dead_address")}</b> I hereby declare that apart from the following persons mentioned below, there is no other legal heir of the deceased..
</p>

<table border="1" width="100%" cellpadding="5">
<tr>
<th>Sl</th>
<th>Name</th>
<th>Age</th>
<th>Relation</th>
<th>Address</th>
<th>EPIC</th>
</tr>
${rows}
</table>

<br><br>

<p>Place: Deor Gram Panchayat</p>

<br><br>

<p style="text-align:justify;">
<b>Declaration:</b><br>
I hereby declare that the information provided above is true and correct to the best of my knowledge and belief. 
If any information is found to be incorrect or false, I shall be liable for legal action as per law. 
I therefore request the competent authority to kindly verify my application at the earliest and issue the Legal Heir Certificate in my favour.
</p>

<br><br>

<div style="text-align:right;">
_________________________<br>
Signature of Applicant<br>
${val("app_name")}
</div>

<br><br><br>

<div style="border:1px solid #000; padding:15px;">
<b>Signature of Witness</b>

<table width="100%" style="margin-top:10px;">
<tr>
<td>
1. _________________________<br><br>
2. _________________________<br><br>
3. _________________________
</td>

<td align="right">
4. _________________________<br><br>
5. _________________________<br><br>
6. _________________________
</td>
</tr>
</table>
</div>

<br><br><br>

<table width="100%">
<tr>
<td>
_________________________<br>
Signature of Member
</td>

<td align="right">
_________________________<br>
Signature of Pradhan
</td>
</tr>
</table>
`;

  document.getElementById("pdfBtn").style.display = "inline-block";

  alert("✅ Submitted Successfully");
}

// PDF
window.downloadPDF = function(){
  html2pdf().from(document.getElementById("output")).save("Legal_Heir_Application.pdf");
}

// init
["app_name","father_name","gender","app_address",
 "dead_name","dead_parent","dead_address"]
.forEach(id => attachLiveValidation(id));

addHeir();

</script>

</body>
</html>
