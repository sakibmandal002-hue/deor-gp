<!DOCTYPE html>
<html>
<head>
  <title>Legal Heir Application</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    h2 { text-align: center; }

    .box {
      background: #fff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
    }

    button {
      padding: 6px 10px;
      margin: 3px;
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      justify-content: space-between;
    }

    #output {
      background: #fff;
      padding: 20px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>Legal Heir Application</h2>

<button onclick="goHome()">⬅ Back</button>
<button onclick="resetForm()">🔄 Reset</button>
<button onclick="generate()">✅ Submit</button>
<button onclick="downloadPDF()" id="pdfBtn" style="display:none;">📄 PDF</button>

<div class="box">
  <h3>Applicant Details</h3>
  <input id="app_name" placeholder="Applicant Name">
  <input id="father_name" placeholder="Father Name">
  <select id="gender">
    <option value="">Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>
  <input id="app_address" placeholder="Address">
</div>

<div class="box">
  <h3>Deceased Details</h3>
  <input id="dead_name" placeholder="Deceased Name">
  <input id="dead_parent" placeholder="Father/Husband/Mother">
  <input id="dead_address" placeholder="Address">
</div>

<div class="box">
  <h3>Legal Heirs</h3>
  <div id="heirs"></div>
</div>

<div id="output"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7...",
  authDomain: "deor-gp.firebaseapp.com",
  projectId: "deor-gp",
  storageBucket: "deor-gp.appspot.com",
  messagingSenderId: "119940582286",
  appId: "1:119940582286:web:f39346b6cc185809a232df"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let heirCount = 0;

window.goHome = () => window.location.href = "index.html";
window.resetForm = () => location.reload();

// ✅ ADD HEIR WITH EPIC
window.addHeir = function(){
  heirCount++;

  let div = document.createElement("div");
  div.className = "box";
  div.id = "heir" + heirCount;

  div.innerHTML = `
    <div class="btn-row">
      <b>Heir ${heirCount}</b>
      <div>
        <button type="button" onclick="addHeir()">➕</button>
        <button type="button" onclick="removeHeir(${heirCount})">❌</button>
      </div>
    </div>

    <input id="name${heirCount}" placeholder="Name">
    <input id="rel${heirCount}" placeholder="Relation">
    <input id="addr${heirCount}" placeholder="Address">
    <input id="age${heirCount}" placeholder="Age">
    <input id="epic${heirCount}" placeholder="EPIC Number">
  `;

  document.getElementById("heirs").appendChild(div);
}

// REMOVE
window.removeHeir = function(id){
  let el = document.getElementById("heir"+id);
  if(el) el.remove();
}

// VALUE SAFE
function val(id){
  let el = document.getElementById(id);
  return el ? el.value.trim() || "-" : "-";
}

// SUBMIT
window.generate = async function(){

  if(heirCount === 0){
    alert("Add at least 1 heir");
    return;
  }

  let rows = "";
  let serial = 1;

  for(let i=1;i<=heirCount;i++){
    if(document.getElementById("name"+i)){
      rows += `
      <tr>
        <td>${serial++}</td>
        <td>${val("name"+i)}</td>
        <td>${val("age"+i)}</td>
        <td>${val("rel"+i)}</td>
        <td>${val("addr"+i)}</td>
        <td>${val("epic"+i)}</td>
      </tr>`;
    }
  }

  let now = new Date();
  let today = now.toLocaleDateString("en-GB");
  let ackID = `${now.getFullYear()}-DGP-LHA-${Date.now().toString().slice(-5)}`;

  await addDoc(collection(db, "applications"), {
    ackID,
    applicant: val("app_name"),
    fatherName: val("father_name"),
    createdAt: serverTimestamp()
  });

  document.getElementById("output").innerHTML = `

<h2 style="text-align:center;">LEGAL HEIR APPLICATION FORM</h2>

<div style="text-align:center; margin-bottom:15px; font-weight:bold;">
  Acknowledgement No: ${ackID} <br>
  Date: ${today}
</div>

<p><b>To</b><br>
The Pradhan<br>
Deor Gram Panchayat</p>

<p style="text-align:center;"><b>Subject: Application for Issuance of Legal Heir Certificate</b></p>

<p>
I, <b>${val("app_name")}</b>, son/daughter of <b>${val("father_name")}</b>,
resident of <b>${val("app_address")}</b>, do hereby state that 
<b>Late ${val("dead_name")}</b>, 
was resident of <b>${val("dead_address")}</b>.
</p>

<table border="1" width="100%" cellpadding="5">
<tr>
<th>Sl</th>
<th>Name</th>
<th>Age</th>
<th>Relation</th>
<th>Address</th>
<th>EPIC</th>
</tr>
${rows}
</table>

<br><br>

<p>Place: Deor Gram Panchayat</p>

<br><br>

<p style="text-align:justify;">
<b>Declaration:</b><br>
I hereby declare that the information provided above is true and correct to the best of my knowledge and belief. 
If any information is found to be incorrect or false, I shall be liable for legal action as per law. 
I therefore request the competent authority to kindly verify my application at the earliest and issue the Legal Heir Certificate in my favour.
</p>

<br><br>

<div style="text-align:right;">
_________________________<br>
Signature of Applicant<br>
${val("app_name")}
</div>

<br><br><br>

<div style="border:1px solid #000; padding:15px;">
<b>Signature of Witness</b>

<table width="100%" style="margin-top:10px;">
<tr>
<td>
1. _________________________<br><br>
2. _________________________<br><br>
3. _________________________
</td>

<td align="right">
4. _________________________<br><br>
5. _________________________<br><br>
6. _________________________
</td>
</tr>
</table>
</div>

<br><br><br>

<table width="100%">
<tr>
<td>
_________________________<br>
Signature of Member
</td>

<td align="right">
_________________________<br>
Signature of Pradhan
</td>
</tr>
</table>
`;

  document.getElementById("pdfBtn").style.display = "inline-block";

  alert("✅ Submitted Successfully");
}

// PDF
window.downloadPDF = function(){
  html2pdf().from(document.getElementById("output")).save("Legal_Heir_Application.pdf");
}

// first heir auto add
addHeir();

</script>

</body>
</html>
