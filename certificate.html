<!DOCTYPE html>
<html>
<head>
  <title>Legal Heir Application</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 180px;
      height: 100%;
      background: #222;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .submit { background: green; color: white; }
    .reset { background: red; color: white; }
    .pdf { background: blue; color: white; display: none; }

    .main {
      margin-left: 200px;
      padding: 20px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    #output {
      width: 210mm;
      min-height: 297mm;
      margin: auto;
      background: white;
      padding: 25mm;
      box-sizing: border-box;
    }

    /* PRINT CONTROL */
    @media print {

      .sidebar {
        display: none;
      }

      .no-print {
        display: none;
      }

      .main {
        margin: 0;
      }

      body {
        background: white;
      }

    }
  </style>
</head>

<body>

<div class="sidebar no-print">
  <button class="reset" onclick="resetForm()">Reset</button>
  <button class="submit" onclick="generate()">Submit</button>
  <button class="pdf" id="printBtn" onclick="printPage()">Print</button>
</div>

<div class="main">

<h2 class="no-print">Legal Heir Application</h2>

<div class="box no-print">

<h3>Applicant</h3>
<input id="app_name" placeholder="Applicant Name">
<input id="app_address" placeholder="Address">
<input id="father_name" placeholder="Father Name">

<select id="gender">
  <option>Male</option>
  <option>Female</option>
</select>

<h3>Deceased</h3>
<input id="dead_name" placeholder="Deceased Name">

<select id="dead_gender">
  <option>Male</option>
  <option>Female</option>
</select>

<input id="relation_name" placeholder="Father/Husband/Mother Name">
<input id="dead_address" placeholder="Address">

<h3>Heir Count</h3>
<select id="count" onchange="createHeirs()">
  <option value="">Select</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
</select>

<div id="heirs"></div>

</div>

<div id="output"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7DaIvAcwQbnu6UA00ENQ438cWSWzxKio",
  authDomain: "deor-gp.firebaseapp.com",
  projectId: "deor-gp",
  storageBucket: "deor-gp.appspot.com",
  messagingSenderId: "119940582286",
  appId: "1:119940582286:web:f39346b6cc185809a232df"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SERIAL ID
async function generateID(){
  const snapshot = await getDocs(collection(db, "applications"));
  let max = 0;

  snapshot.forEach(doc => {
    let id = doc.data().ackID;
    if(id){
      let num = parseInt(id.split("-").pop());
      if(num > max) max = num;
    }
  });

  let next = max + 1;
  return "2026-DGP-LHA-" + String(next).padStart(3,'0');
}

// RESET
window.resetForm = () => location.reload();

// HEIRS
window.createHeirs = function(){
  let count = parseInt(document.getElementById("count").value);
  let container = document.getElementById("heirs");
  container.innerHTML = "";

  if(!count) return;

  for(let i=1;i<=count;i++){
    container.innerHTML += `
      <div class="box">
        <h4>Legal Heir ${i}</h4>
        <input id="name${i}" placeholder="Name">
        <input id="rel${i}" placeholder="Relation">
        <input id="addr${i}" placeholder="Address">
        <input id="age${i}" placeholder="Age">
        <input id="epic${i}" placeholder="EPIC (Optional)">
      </div>
    `;
  }
}

// GENERATE
window.generate = async function(){

  let ackID = await generateID();
  let now = new Date();

  let count = parseInt(document.getElementById("count").value) || 0;

  function val(id){ return document.getElementById(id)?.value || "-" }

  let heirsHTML = "";
  for(let i=1;i<=count;i++){
    heirsHTML += `
      <p><b>Legal Heir ${i}:</b>
      ${val("name"+i)}, ${val("rel"+i)},
      Age: ${val("age"+i)},
      EPIC: ${val("epic"+i) || "N/A"},
      Address: ${val("addr"+i)}</p>
    `;
  }

  let content = `
    <div>

    <h2 style="text-align:center;">DEOR GRAM PANCHAYAT</h2>
    <h3 style="text-align:center;">LEGAL HEIR APPLICATION</h3>

    <p><b>Acknowledgement No:</b> ${ackID}</p>
    <p><b>Date:</b> ${now.toLocaleDateString()} | <b>Time:</b> ${now.toLocaleTimeString()}</p>

    <hr>

    <p><b>Applicant Name:</b> ${val("app_name")}</p>
    <p><b>Address:</b> ${val("app_address")}</p>
    <p><b>Father Name:</b> ${val("father_name")}</p>

    <br>

    <p><b>Deceased Name:</b> ${val("dead_name")}</p>
    <p><b>Relation Name:</b> ${val("relation_name")}</p>
    <p><b>Address:</b> ${val("dead_address")}</p>

    <br>

    <h3>Legal Heirs Details:</h3>
    ${heirsHTML || "-"}

    <br><br>

    <p>
    I hereby declare that the above information is true and correct.
    </p>

    <br><br>

    <h4>Witness:</h4>

    1. ___________________________<br><br>
    2. ___________________________<br><br>
    3. ___________________________<br><br>
    4. ___________________________<br><br>
    5. ___________________________

    <br><br><br>

    <div style="display:flex; justify-content:space-between;">
      <div>
        ___________________________<br>
        Signature of Member
      </div>

      <div>
        ___________________________<br>
        Signature of Pradhan
      </div>
    </div>

    </div>
  `;

  document.getElementById("output").innerHTML = content;

  await addDoc(collection(db, "applications"), {
    ackID,
    applicant: val("app_name"),
    createdAt: now
  });

  document.getElementById("printBtn").style.display = "block";
}

// PRINT
window.printPage = function(){

  let content = document.getElementById("output");

  if(!content.innerHTML.trim()){
    alert("Generate form first");
    return;
  }

  window.print();
}

</script>

</body>
</html>
