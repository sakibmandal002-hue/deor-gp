<!DOCTYPE html>
<html>
<head>
  <title>Legal Heir Application</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    @page {
      size: A4;
      margin: 15mm;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 180px;
      height: 100%;
      background: #222;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }

    .home { background: orange; }
    .submit { background: green; }
    .reset { background: red; }
    .pdf { background: blue; display: none; }

    .main {
      margin-left: 200px;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    #output {
      width: 210mm;
      min-height: 297mm;
      margin: auto;
      background: white;
      padding: 15mm;
      box-sizing: border-box;
    }

    .two-col {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
    }

    .col {
      width: 45%;
    }

    .sign {
      margin-top: 40px;
    }

    @media print {
      .sidebar, .no-print {
        display: none;
      }

      .main {
        margin: 0;
        padding: 0;
      }
    }
  </style>
</head>

<body>

<div class="sidebar no-print">
  <button class="home" onclick="goHome()">Home</button>
  <button class="reset" onclick="resetForm()">Reset</button>
  <button class="submit" onclick="generate()">Submit</button>
  <button class="pdf" id="printBtn" onclick="printPage()">Print</button>
</div>

<div class="main">

<h2 class="no-print">Legal Heir Application</h2>

<div class="box no-print">

<h3>Applicant</h3>
<input id="app_name" placeholder="Applicant Name">
<input id="father_name" placeholder="Father Name">
<input id="app_address" placeholder="Address">

<h3>Deceased</h3>
<input id="dead_name" placeholder="Deceased Name">
<input id="relation_name" placeholder="Father/Husband Name">
<input id="dead_address" placeholder="Last Address">

<h3>No. of Legal Heirs</h3>
<input type="number" id="count" oninput="createHeirs()">

<div id="heirs"></div>

</div>

<div id="output"></div>

</div>

<script>

function goHome(){
  window.location.href = "index.html";
}

function resetForm(){
  location.reload();
}

function createHeirs(){
  let c = document.getElementById("count").value;
  let h = document.getElementById("heirs");
  h.innerHTML = "";

  for(let i=1;i<=c;i++){
    h.innerHTML += `
      <div class="box">
        <h4>Heir ${i}</h4>
        <input id="name${i}" placeholder="Name">
        <input id="age${i}" placeholder="Age">
        <input id="rel${i}" placeholder="Relation">
        <input id="addr${i}" placeholder="Address">
      </div>
    `;
  }
}

function val(id){
  return document.getElementById(id)?.value || "-";
}

function generate(){

  let c = document.getElementById("count").value;
  let rows = "";

  for(let i=1;i<=c;i++){
    rows += `
      <tr>
        <td>${i}</td>
        <td>${val("name"+i)}</td>
        <td>${val("age"+i)}</td>
        <td>${val("rel"+i)}</td>
        <td>${val("addr"+i)}</td>
      </tr>
    `;
  }

  function generate(){

  let c = document.getElementById("count").value;
  let rows = "";

  for(let i=1;i<=c;i++){
    rows += `
      <tr>
        <td>${i}</td>
        <td>${val("name"+i)}</td>
        <td>${val("age"+i)}</td>
        <td>${val("rel"+i)}</td>
        <td>${val("addr"+i)}</td>
        <td>${val("epic"+i)}</td>
      </tr>
    `;
  }

  document.getElementById("output").innerHTML = `
  
  <h2 style="text-align:center;">Application for Legal Heir Certificate</h2>

  <p>
  To,<br>
  The Prodhan,<br>
  Deor Gram Panchayat<br>
  Vill-Jarlai, P.O-Deor, P.S-Kumarganj,<br>
  Dist-Dakshin Dinajpur, Pin-733140
  </p>

  <p><b>Subject:</b> Application for issuance of Legal Heir Certificate.</p>

  <p>
  <b>Name of the Applicant:</b> ${val("app_name")}<br>
  <b>Father's Name:</b> ${val("father_name")}<br>
  <b>Address:</b> ${val("app_address")}
  </p>

  <h4>Details of the Deceased</h4>
  <p>
  <b>Name:</b> ${val("dead_name")}<br>
  <b>Father/Husband Name:</b> ${val("relation_name")}<br>
  <b>Last Address:</b> ${val("dead_address")}
  </p>

  <h4>List of Legal Heirs</h4>

  <table border="1" width="100%" cellspacing="0" cellpadding="5">
    <tr>
      <th>Sl No</th>
      <th>Name</th>
      <th>Age</th>
      <th>Relation</th>
      <th>Address</th>
      <th>EPIC</th>
    </tr>
    ${rows}
  </table>

  <br>

  <p><b>Purpose of Certificate:</b> Official Purpose</p>

  <h4>List of Documents Attached</h4>

  <p>
  ☐ Death Certificate<br>
  ☐ Identity Proof (Aadhaar/PAN/Voter ID)<br>
  ☐ Address Proof<br>
  ☐ Self-Affidavit / Undertaking
  </p>

  <br>

  <h4>Declaration</h4>
  <p>
  I hereby declare that the information above is true to the best of my knowledge and belief.
  </p>

  <br>

  <div style="display:flex; justify-content:space-between;">
    <div>Date: ____________</div>
    <div>Place: ____________</div>
  </div>

  <br><br>

  <p style="text-align:right;">Signature of Applicant</p>

  <br><br>

  <!-- Witness -->
  <div style="display:flex; justify-content:space-between;">
    
    <div>
      1. ___________________<br><br>
      2. ___________________<br><br>
      3. ___________________
    </div>

    <div>
      4. ___________________<br><br>
      5. ___________________<br><br>
      6. ___________________
    </div>

  </div>

  <br><br><br>

    <!-- SIGNATURE -->
    <div class="two-col">
      <div class="col">
        Member Signature
      </div>

      <div class="col" style="text-align:right;">
        Prodhan Signature
      </div>
    </div>
  `;

  document.getElementById("printBtn").style.display = "block";
}

function printPage(){
  window.print();
}

</script>

</body>
</html>
