<!DOCTYPE html>
<html>
<head>
<title>Family Tree Certificate</title>

<style>
body {
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
}

.box {
  background:#f9f9f9;
  padding:15px;
  margin:10px auto;
  width:360px;
  border-radius:8px;
}

input, select {
  width:95%;
  padding:6px;
  margin:5px;
}

button {
  padding:8px 15px;
  margin:10px;
  cursor:pointer;
}

/* Certificate */
#certificate {
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:20mm;
  background:white;
  display:none;

  background:url('letterhead.jpg') no-repeat top center;
  background-size:100% auto;
  overflow:visible;
}

/* Tree */
.parent-box {
  border:2px solid black;
  background:#f2f2f2;
  padding:10px;
  display:inline-block;
  margin:10px;
  width:200px;
}

.sibling-box {
  border:1px solid black;
  background:#f2f2f2;
  padding:8px;
  width:160px;
}

.line {
  width:2px;
  height:40px;
  background:black;
  margin:auto;
}

.h-line {
  height:2px;
  background:black;
  margin:10px auto;
}

.v-line {
  width:2px;
  height:30px;
  background:black;
  margin:auto;
}

.siblings-wrapper {
  display:flex;
  justify-content:center;
  align-items:flex-start;
  flex-wrap:wrap;
}

.sibling-item {
  text-align:center;
  margin:0 8px;
}

.number {
  font-weight:bold;
  margin-bottom:4px;
}

.app-left {
  text-align:left;
}

.tree-center {
  text-align:center;
  margin-bottom:40px;
}

.print-btn {
  background:green;
  color:white;
}
</style>
</head>

<body>

<h2>Family Tree Form</h2>

<!-- FORM -->

<div class="box">
<h3>Applicant Details</h3>
<input id="app_name" placeholder="Applicant Name">
<input id="app_relation" placeholder="Relation">
<input id="app_father" placeholder="Father Name">
<input id="app_address" placeholder="Address">
<input id="app_epic" placeholder="EPIC">
<input id="app_age" placeholder="Age">
<select id="app_gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="box">
<h3>Father Details</h3>
<input id="f_name" placeholder="Father Name">
<input id="f_father" placeholder="Grandfather">
<input id="f_epic" placeholder="EPIC">
<select id="f_status">
<option>Alive</option>
<option>Deceased</option>
</select>
</div>

<div class="box">
<h3>Mother Details</h3>
<input id="m_name" placeholder="Mother Name">
<input id="m_father" placeholder="Grandfather">
<input id="m_epic" placeholder="EPIC">
<select id="m_status">
<option>Alive</option>
<option>Deceased</option>
</select>
</div>

<div class="box">
<h3>Siblings</h3>
<input id="count" type="number" placeholder="No. of siblings">
<button onclick="createSiblings()">Create</button>
<div id="siblingsForm"></div>
</div>

<button onclick="generate()">Generate Certificate</button>

<!-- Certificate -->
<div id="certificate">
<div id="output"></div>
<button class="print-btn" onclick="window.print()">Print / Download</button>
</div>

<script>
let count = 0;

function createSiblings(){
  count = document.getElementById("count").value;
  let html = "";

  for(let i=1;i<=count;i++){
    html += `
    <div class="box">
      <h4>Sibling ${i}</h4>
      <input id="name${i}" placeholder="Name">
      <select id="gender${i}">
        <option>Male</option>
        <option>Female</option>
      </select>
      <input id="age${i}" placeholder="Age">
      <input id="epic${i}" placeholder="EPIC">
      <input id="addr${i}" placeholder="Address">
      <select id="marital${i}">
        <option>Married</option>
        <option>Unmarried</option>
      </select>
      <select id="status${i}">
        <option>Alive</option>
        <option>Deceased</option>
      </select>
    </div>`;
  }

  document.getElementById("siblingsForm").innerHTML = html;
}

function generate(){

  let siblingsHTML = "";
  let width = count * 170;

  let fontSize = 14;
  if(count >= 6) fontSize = 12;
  if(count >= 10) fontSize = 10;

  for(let i=1;i<=count;i++){
    let name = document.getElementById("name"+i).value;

    if(name){
      siblingsHTML += `
      <div class="sibling-item">
        <div class="v-line"></div>
        <div class="number">${i}</div>
        <div class="sibling-box" style="font-size:${fontSize}px;">
          <b>${name}</b><br>
          ${document.getElementById("gender"+i).value}<br>
          Age: ${document.getElementById("age"+i).value}<br>
          EPIC: ${document.getElementById("epic"+i).value}<br>
          ${document.getElementById("addr"+i).value}<br>
          ${document.getElementById("marital"+i).value}<br>
          ${document.getElementById("status"+i).value}
        </div>
      </div>`;
    }
  }

  let html = `
  <h3 style="text-align:center; margin-top:120px;">
  FAMILY TREE CERTIFICATE
  </h3>

  <div class="app-left">
    <p style="font-weight:bold;">
    Name: ${app_name.value}<br>
    ${app_relation.value} of ${app_father.value}<br>
    Address: ${app_address.value}<br>
    EPIC: ${app_epic.value}, Age: ${app_age.value}<br>
    Gender: ${app_gender.value}
    </p>
  </div>

  <p class="app-left">
  This is to certify that the family composition of 
  <b>${app_name.value}</b>, ${app_relation.value} of 
  <b>${app_father.value}</b>, resident of ${app_address.value}, 
  is as follows:
  </p>

  <div class="tree-center">

    <div class="parent-box">
      <b>Father</b><br>
      ${f_name.value}<br>
      S/O ${f_father.value}<br>
      EPIC: ${f_epic.value}<br>
      ${f_status.value}
    </div>

    <div class="parent-box">
      <b>Mother</b><br>
      ${m_name.value}<br>
      D/O ${m_father.value}<br>
      EPIC: ${m_epic.value}<br>
      ${m_status.value}
    </div>

    <div class="line"></div>

    <div class="h-line" style="width:${width}px;"></div>

    <div class="siblings-wrapper">
      ${siblingsHTML}
    </div>

  </div>

  <p style="text-align:right; margin-top:80px;">
  Signature of Pradhan
  </p>
  `;

  document.getElementById("output").innerHTML = html;
  document.getElementById("certificate").style.display = "block";
}
</script>

</body>
</html>
