<!DOCTYPE html>
<html>
<head>
<title>Family Tree Certificate</title>

<style>
body {
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
}

.box {
  background:#f9f9f9;
  padding:15px;
  margin:10px auto;
  width:360px;
  border-radius:8px;
}

input, select {
  width:95%;
  padding:6px;
  margin:5px;
}

button {
  padding:8px 15px;
  margin:10px;
  cursor:pointer;
}

.btn-row {
  display:flex;
  justify-content:center;
  gap:10px;
}

/* Certificate */
#certificate {
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:20mm;
  background:white;
  display:none;
  background:url('letterhead.jpg') no-repeat top center;
  background-size:100% auto;
}

/* PRINT */
@media print {
  body * { visibility:hidden; }
  #certificate, #certificate * { visibility:visible; }

  #certificate {
    position:absolute;
    top:0;
    left:0;
    width:210mm;
    height:297mm;
    margin:0;
  }

  button { display:none; }
}

/* Tables */
table {
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th, td {
  border:1px solid black;
  padding:6px;
}

th {
  background:#ddd;
}

.app-left {
  text-align:left;
}
</style>
</head>

<body>

<h2>Family Tree Form</h2>

<div class="box">
<h3>Applicant Details</h3>
<input id="app_name" placeholder="Applicant Name">
<input id="app_relation" placeholder="Relation (Son/Wife/Daughter)">
<input id="app_father" placeholder="Father Name">
<input id="app_address" placeholder="Address">
<input id="app_epic" placeholder="EPIC">
<input id="app_age" placeholder="Age">

<select id="app_gender">
<option>Male</option>
<option>Female</option>
</select>

<select id="app_marital">
<option>Married</option>
<option>Unmarried</option>
</select>
</div>

<div class="box">
<h3>Father Details</h3>
<input id="f_name" placeholder="Father Name">
<input id="f_father" placeholder="Grandfather">
<input id="f_epic" placeholder="EPIC">
<select id="f_status">
<option>Alive</option>
<option>Deceased</option>
</select>
</div>

<div class="box">
<h3>Mother Details</h3>
<input id="m_name" placeholder="Mother Name">
<input id="m_father" placeholder="Grandfather">
<input id="m_epic" placeholder="EPIC">
<select id="m_status">
<option>Alive</option>
<option>Deceased</option>
</select>
</div>

<div class="box">
<h3>Siblings</h3>
<input id="count" type="number" placeholder="No. of siblings">
<button onclick="createSiblings()">Create</button>
<div id="siblingsForm"></div>
</div>

<div class="btn-row">
<button onclick="generate()">Generate Certificate</button>
<button onclick="window.print()">Print</button>
</div>

<div id="certificate">
<div id="output"></div>
</div>

<script>
let count = 0;

function createSiblings(){
  count = document.getElementById("count").value;
  let html = "";

  for(let i=1;i<=count;i++){
    html += `
    <div class="box">
      <h4>Sibling ${i}</h4>
      <input id="name${i}" placeholder="Name">
      <select id="gender${i}">
        <option>Male</option>
        <option>Female</option>
      </select>
      <input id="age${i}" placeholder="Age">
      <input id="epic${i}" placeholder="EPIC">
      <input id="addr${i}" placeholder="Address">
      <select id="marital${i}">
        <option>Married</option>
        <option>Unmarried</option>
      </select>
      <select id="status${i}">
        <option>Alive</option>
        <option>Deceased</option>
      </select>
    </div>`;
  }

  document.getElementById("siblingsForm").innerHTML = html;
}

function generate(){

  let siblingsRows = "";

  for(let i=1;i<=count;i++){
    let name = document.getElementById("name"+i).value;

    if(name){
      siblingsRows += `
      <tr>
        <td>${i}</td>
        <td>${name}</td>
        <td>${document.getElementById("gender"+i).value}</td>
        <td>${document.getElementById("age"+i).value}</td>
        <td>${document.getElementById("marital"+i).value}</td>
        <td>${document.getElementById("status"+i).value}</td>
        <td>${document.getElementById("epic"+i).value}</td>
        <td>${document.getElementById("addr"+i).value}</td>
      </tr>`;
    }
  }

  let relationType = "by relation";

  if(app_relation.value.toLowerCase().includes("wife")){
    relationType = "by marriage";
  }
  else if(app_relation.value.toLowerCase().includes("son")){
    relationType = "by birth";
  }
  else if(app_relation.value.toLowerCase().includes("daughter")){
    relationType = (app_marital.value === "Married") ? "by marriage" : "by birth";
  }

  let html = `
  <div style="margin-top:120px; font-size:15px; line-height:1.6;">

  <h3 style="text-align:center; text-decoration:underline;">
  FAMILY TREE CERTIFICATE
  </h3>

  <div class="app-left" style="margin-top:25px;">
    <b>Name:</b> ${app_name.value}<br>
    <b>${app_relation.value} of:</b> ${app_father.value}<br>
    <b>Address:</b> ${app_address.value}<br>
    <b>EPIC:</b> ${app_epic.value}, Age: ${app_age.value}<br>
    <b>Gender:</b> ${app_gender.value}<br>
    <b>Marital Status:</b> ${app_marital.value}
  </div>

  <p class="app-left" style="margin-top:20px;">
  This is to certify that the family composition of 
  <b>${app_name.value}</b> is detailed below:
  </p>

  <table style="margin-top:20px;">
    <tr>
      <th colspan="2">Parents Details</th>
    </tr>
    <tr>
      <td><b>Father</b><br>${f_name.value}<br>Status: ${f_status.value}</td>
      <td><b>Mother</b><br>${m_name.value}<br>Status: ${m_status.value}</td>
    </tr>
  </table>

  <h4 style="margin-top:30px; text-align:left;">
  Children Details
  </h4>

  <table>
    <tr>
      <th>Sl</th>
      <th>Name</th>
      <th>Gender</th>
      <th>Age</th>
      <th>Marital</th>
      <th>Status</th>
      <th>EPIC</th>
      <th>Address</th>
    </tr>

    ${siblingsRows}

  </table>

  <p class="app-left" style="margin-top:25px;">
  It is hereby verified that <b>${app_name.value}</b> is a resident ${relationType}.I know him/her personally and I wish him/her a bright and prosperous future
  </p>

  <p style="text-align:right; margin-top:80px;">
  Signature of Pradhan
  </p>

  </div>
  `;

  document.getElementById("output").innerHTML = html;
  document.getElementById("certificate").style.display = "block";
}
</script>

</body>
</html>
